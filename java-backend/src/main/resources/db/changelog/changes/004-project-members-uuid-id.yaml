databaseChangeLog:
  - changeSet:
      id: 004-01-project-members-add-id-column
      author: aigiz
      preConditions:
        - onFail: MARK_RAN
        - not:
            columnExists:
              tableName: project_members
              columnName: id
      changes:
        - addColumn:
            tableName: project_members
            columns:
              - column:
                  name: id
                  type: uuid

  - changeSet:
      id: 004-02-project-members-backfill-id
      author: aigiz
      changes:
        - sql:
            splitStatements: false
            stripComments: true
            sql: |
              UPDATE project_members
              SET id = (
                substr(md5(project_id::text || ':' || user_id::text), 1, 8) || '-' ||
                substr(md5(project_id::text || ':' || user_id::text), 9, 4) || '-' ||
                substr(md5(project_id::text || ':' || user_id::text), 13, 4) || '-' ||
                substr(md5(project_id::text || ':' || user_id::text), 17, 4) || '-' ||
                substr(md5(project_id::text || ':' || user_id::text), 21, 12)
              )::uuid
              WHERE id IS NULL;

  - changeSet:
      id: 004-03-project-members-id-not-null
      author: aigiz
      preConditions:
        - onFail: MARK_RAN
        - columnExists:
            tableName: project_members
            columnName: id
        - sqlCheck:
            expectedResult: "1"
            sql: |
              SELECT COUNT(*)
              FROM information_schema.columns
              WHERE table_schema = 'public'
                AND table_name = 'project_members'
                AND column_name = 'id'
                AND is_nullable = 'YES'
      changes:
        - addNotNullConstraint:
            tableName: project_members
            columnName: id
            columnDataType: uuid

  - changeSet:
      id: 004-04-project-members-switch-primary-key
      author: aigiz
      preConditions:
        - onFail: MARK_RAN
        - columnExists:
            tableName: project_members
            columnName: id
        - sqlCheck:
            expectedResult: "0"
            sql: |
              SELECT COUNT(*)
              FROM information_schema.table_constraints tc
              JOIN information_schema.key_column_usage kcu
                ON tc.constraint_name = kcu.constraint_name
               AND tc.table_schema = kcu.table_schema
              WHERE tc.table_schema = 'public'
                AND tc.table_name = 'project_members'
                AND tc.constraint_type = 'PRIMARY KEY'
                AND kcu.column_name = 'id'
      changes:
        - dropPrimaryKey:
            tableName: project_members
        - addPrimaryKey:
            tableName: project_members
            columnNames: id
            constraintName: pk_project_members

  - changeSet:
      id: 004-05-project-members-project-user-unique
      author: aigiz
      preConditions:
        - onFail: MARK_RAN
        - not:
            uniqueConstraintExists:
              tableName: project_members
              constraintName: uk_project_members_project_user
      changes:
        - addUniqueConstraint:
            tableName: project_members
            columnNames: project_id, user_id
            constraintName: uk_project_members_project_user
